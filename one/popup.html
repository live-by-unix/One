<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root { --bg: #ffffff; --text: #1a1a1a; --accent: #007AFF; }
    body { 
      width: 300px; 
      margin: 0; 
      padding: 24px; 
      background: var(--bg); 
      color: var(--text); 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .container { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    h1 { font-size: 12px; font-weight: 800; letter-spacing: 4px; margin: 0; color: var(--text); opacity: 0.5; }
    #fact { 
      font-size: 16px; 
      line-height: 1.5; 
      font-weight: 400; 
      text-align: center; 
      min-height: 80px; 
      display: flex;
      align-items: center;
    }
    button {
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.2s;
      width: 100%;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    .footer { font-size: 10px; opacity: 0.3; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>ONE</h1>
    <div id="fact">Initializing...</div>
    <button id="trigger">GET FACT</button>
    <div class="footer">v1.0.0</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
